<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alerts — Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/alerts.css" />
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E53935" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <span class="sidebar-logo-text">InvenTrack</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="products.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <span class="nav-label">Products</span>
      </a>
      <a href="categories.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">Categories</span>
      </a>
      <a href="stock.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="16"/>
        </svg>
        <span class="nav-label">Stock</span>
      </a>
      <a href="alerts.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="nav-label">Alerts</span>
        <span class="nav-badge" id="sidebarBadge">4</span>
      </a>
      <a href="users.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="nav-label">Users</span>
      </a>
      <a href="settings.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 1.41 14.14M4.93 4.93A10 10 0 0 0 3.52 19.07"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar">JD</div>
      <div class="user-info">
        <span class="user-name">James Donovan</span>
        <span class="user-role">Administrator</span>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Header -->
    <header class="top-header">
      <div class="header-left">
        <h1 class="page-title" id="pageTitle">Alerts</h1>
      </div>
      <div class="header-right">
        <div class="alert-pill" id="alertPill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="alertPillText">4 low stock alerts</span>
        </div>
        <button class="bell-btn" id="bellBtn" aria-label="View alerts">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="bell-dot"></span>
        </button>
        <div class="header-date" id="headerDate"></div>
      </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

      <!-- Page Header -->
      <div class="alerts-page-header">
        <div class="alerts-header-left">
          <h2 class="alerts-title">Alert Feed</h2>
          <p class="alerts-subtitle" id="alertsSubtitle">
            <span class="unread-count" id="unreadCount">4 unread</span> alerts require attention
          </p>
        </div>
        <button class="btn-mark-all-read" id="btnMarkAllRead" aria-label="Mark all alerts as read">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Mark all as read
        </button>
      </div>

      <!-- Filter Tabs -->
      <div class="tab-filter-container" role="tablist" aria-label="Filter alerts by severity">
        <button class="tab-filter-btn active" data-filter="All" aria-label="Show all alerts" aria-selected="true" role="tab">
          All <span class="tab-count">(8)</span>
        </button>
        <button class="tab-filter-btn" data-filter="critical" aria-label="Filter by critical alerts" aria-selected="false" role="tab">
          Critical <span class="tab-count">(2)</span>
        </button>
        <button class="tab-filter-btn" data-filter="warning" aria-label="Filter by warning alerts" aria-selected="false" role="tab">
          Warning <span class="tab-count">(3)</span>
        </button>
        <button class="tab-filter-btn" data-filter="info" aria-label="Filter by info alerts" aria-selected="false" role="tab">
          Info <span class="tab-count">(3)</span>
        </button>
      </div>

      <!-- Alert List -->
      <div class="alert-list" id="alertList" role="list">
        <!-- Rendered by alerts.js -->
      </div>

      <!-- Empty State (hidden by default) -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg class="empty-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p class="empty-heading">No alerts here</p>
        <p class="empty-text" id="emptyText">All clear — no alerts at this time.</p>
      </div>

    </div><!-- /page-container -->

  </main>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast" role="alert" aria-live="assertive">
    <div class="toast-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF1744" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="toast-body">
      <p class="toast-title">Stock Alert</p>
      <p class="toast-msg" id="toastMsg">You have unread inventory alerts.</p>
    </div>
    <button class="toast-close" id="toastClose" aria-label="Close notification">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Screen reader announcements -->
  <div id="srAnnouncement" role="status" aria-live="polite" class="sr-only"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/alerts.js"></script>
</body>
</html>
