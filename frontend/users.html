<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/users.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <span class="logo-text">InvenTrack</span>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="products.html" class="nav-item" data-page="products">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Products</span>
      </a>
      <a href="categories.html" class="nav-item" data-page="categories">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2z"/></svg>
        <span>Categories</span>
      </a>
      <a href="stock.html" class="nav-item" data-page="stock">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Stock</span>
      </a>
      <a href="alerts.html" class="nav-item" data-page="alerts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Alerts</span>
        <span class="nav-badge" id="navBadge">3</span>
      </a>
      <a href="users.html" class="nav-item active" data-page="users">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Users</span>
      </a>
      <a href="settings.html" class="nav-item" data-page="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar-sm" style="background:#E53935;">JD</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">James Donovan</span>
        <span class="sidebar-user-role">Administrator</span>
      </div>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <main class="main-content" id="mainContent">

    <!-- Header -->
    <header class="top-header">
      <div class="header-left">
        <h1 class="page-title" id="pageTitle">User Management</h1>
        <span class="header-date" id="headerDate"></span>
      </div>
      <div class="header-right">
        <div class="alert-pill" id="alertPill">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span id="alertPillCount">3 low stock alerts</span>
        </div>
        <button class="bell-btn" id="bellBtn" aria-label="View alerts">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="bell-dot"></span>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <div class="page-section active" id="usersSection">

      <!-- Toolbar -->
      <div class="users-toolbar">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by name or email…"
            aria-label="Search users by name or email"
          />
        </div>

        <div class="select-wrapper">
          <select id="roleFilter" class="select-dropdown" data-filter="role" aria-label="Filter by role">
            <option value="All">All Roles</option>
            <option value="Administrator">Administrator</option>
            <option value="Manager">Manager</option>
            <option value="Viewer">Viewer</option>
          </select>
          <svg class="select-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <div class="select-wrapper">
          <select id="statusFilter" class="select-dropdown" data-filter="status" aria-label="Filter by status">
            <option value="All">All Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
          <svg class="select-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <button class="btn-primary" id="addUserBtn" aria-label="Add new user">
          <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          Add User
        </button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table class="users-table" aria-label="Users table">
          <thead>
            <tr>
              <th class="th-user">USER</th>
              <th>EMAIL</th>
              <th>ROLE</th>
              <th>STATUS</th>
              <th>LAST ACTIVE</th>
              <th class="th-actions">ACTIONS</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>

      <!-- Footer -->
      <p class="footer-text" id="footerText">Loading…</p>

    </div><!-- /usersSection -->
  </main>

  <!-- ── Modal ───────────────────────────────────────────────────── -->
  <div class="modal-backdrop" id="userModal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title-section">
          <h2 class="modal-title" id="modalTitle">Add New User</h2>
          <p class="modal-subtitle" id="modalSubtitle">Add a new team member</p>
        </div>
        <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-field">
          <label class="form-label" for="inputName">Full Name</label>
          <input id="inputName" class="form-input" type="text" placeholder="e.g. Sarah Mitchell" autocomplete="off" />
        </div>
        <div class="form-field">
          <label class="form-label" for="inputEmail">Email Address</label>
          <input id="inputEmail" class="form-input" type="email" placeholder="e.g. sarah@company.com" autocomplete="off" />
        </div>
        <div class="form-field">
          <label class="form-label">Role</label>
          <div class="toggle-group" id="roleToggleGroup">
            <button class="toggle-btn active" data-value="Administrator">Administrator</button>
            <button class="toggle-btn" data-value="Manager">Manager</button>
            <button class="toggle-btn" data-value="Viewer">Viewer</button>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Status</label>
          <div class="toggle-group" id="statusToggleGroup">
            <button class="toggle-btn toggle-active active" data-value="Active">Active</button>
            <button class="toggle-btn toggle-inactive" data-value="Inactive">Inactive</button>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">Cancel</button>
        <button class="modal-btn modal-btn-save" id="modalSaveBtn">Add User</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────────────── -->
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="toast-msg" id="toastMsg">3 low stock alerts need attention</span>
    <button class="toast-close" id="toastClose" aria-label="Dismiss notification">✕</button>
  </div>

  <script src="js/users.js"></script>
</body>
</html>
